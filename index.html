<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Qard</title>
<meta name="description" content="Qard — Karteikarten mit Leitner-Boxen. Fächer liegen als HTML-Dateien im Ordner faecher/.">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#dde3e8" id="metaTheme">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Qard">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Archivo+Narrow:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
(function(){
  try{
    var p = localStorage.getItem('qard-theme') || localStorage.getItem('psi-theme') || 'auto';
    var d = p === 'dark' || (p === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
    document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
  }catch(e){ document.documentElement.setAttribute('data-theme','light'); }
})();
</script>

<style>
/* =====================================================================
   Qard — technische Zeichnung als Gestaltungsprinzip
   ===================================================================== */
:root{
  --bg:#dde3e8; --bg-grid:#cfd8de; --sheet:#fbfcfd; --sheet-2:#f0f3f6;
  --sheet-a:rgba(251,252,253,.92);
  --ink:#0e1a24; --ink-2:#4d5d69; --ink-3:#7c8b96;
  --rule:#b6c2cb; --rule-2:#d7dee4;
  --red:#b3341c; --ok:#1c6a56; --no:#b3341c; --amber:#9a6a12;
  --scrim:rgba(14,26,36,.5);
  --sans:'Archivo','Segoe UI',Helvetica,Arial,sans-serif;
  --cond:'Archivo Narrow','Archivo','Segoe UI Semibold',Helvetica,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp5:24px; --sp6:32px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html[data-theme="dark"]{
  --bg:#0f151a; --bg-grid:#161f26; --sheet:#161d23; --sheet-2:#1d262d;
  --sheet-a:rgba(22,29,35,.93);
  --ink:#e3eaf0; --ink-2:#a7b5bf; --ink-3:#7b8b96;
  --rule:#2e3a43; --rule-2:#242e36;
  --red:#e2694c; --ok:#3f9f85; --no:#e2694c; --amber:#cb9a3e;
  --scrim:rgba(0,0,0,.62);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html.locked,html.locked body{overflow:hidden}
body{
  background:var(--bg);
  background-image:
    linear-gradient(var(--bg-grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);
  background-size:28px 28px;
  color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overflow-wrap:break-word;
}
.wrap{max-width:900px;margin:0 auto;padding:0 var(--sp4)}
.hidden{display:none !important}
:focus-visible{outline:2px solid var(--red);outline-offset:2px}
button{font:inherit;color:inherit;touch-action:manipulation}

/* ---------- Kopf ---------- */
header{
  position:sticky;top:0;z-index:30;background:var(--sheet-a);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--rule);
}
.bar{max-width:900px;margin:0 auto;padding:9px var(--sp4);display:flex;align-items:center;gap:var(--sp3);flex-wrap:wrap}

/* Fach-Umschalter in der Kopfzeile */
.fachbtn{
  display:flex;align-items:center;gap:9px;background:none;border:0;padding:2px 0;
  cursor:pointer;text-align:left;min-width:0;
}
.fachbtn .k{
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;
  background:var(--ink);color:var(--sheet);padding:4px 7px;border-radius:2px;flex:0 0 auto;
}
.fachbtn .n{
  font-family:var(--cond);font-weight:700;font-size:17px;letter-spacing:.02em;
  text-transform:uppercase;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fachbtn .x{font-family:var(--mono);font-size:10px;color:var(--ink-3);flex:0 0 auto}
.bar-sp{flex:1}

.seg{display:inline-flex;border:1px solid var(--rule);background:var(--sheet);border-radius:2px;overflow:hidden}
.seg button{
  font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;
  background:none;border:0;padding:8px 14px;cursor:pointer;color:var(--ink-2);
  border-right:1px solid var(--rule);white-space:nowrap;
}
.seg button:last-child{border-right:0}
.seg button[aria-selected="true"]{background:var(--ink);color:var(--sheet)}

.ibtn{
  width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;
  background:var(--sheet);border:1px solid var(--rule);border-radius:2px;cursor:pointer;position:relative;
}
.ibtn:hover{border-color:var(--ink-3)}
.ibtn svg{width:17px;height:17px;stroke:var(--ink-2);fill:none;stroke-width:1.6;stroke-linecap:round}
.ibtn .dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--ink-3);border:1px solid var(--sheet)}
.ibtn .dot.on{background:var(--ok)}

.meter{height:5px;display:flex;width:100%;background:var(--rule-2);position:relative}
.meter i{display:block;height:100%;transition:width .3s ease}
.meter::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent 0 27px,rgba(14,26,36,.22) 27px 28px)}
html[data-theme="dark"] .meter::after{background:repeating-linear-gradient(90deg,transparent 0 27px,rgba(255,255,255,.14) 27px 28px)}
.m-ok{background:var(--ok)}
.m-mid{background:var(--amber)}
.m-new{background:transparent}

/* ---------- Statistik ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);margin:var(--sp4) 0 var(--sp3)}
.stat{background:var(--sheet);padding:8px 11px 9px}
.stat b{display:block;font-family:var(--cond);font-size:23px;line-height:1.15;font-weight:700}
.stat s{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);text-decoration:none;margin-top:1px}

/* ---------- Filter ---------- */
.fbar{width:100%;display:flex;align-items:center;gap:var(--sp2);background:var(--sheet);border:1px solid var(--rule);border-radius:2px;padding:9px 12px;cursor:pointer;text-align:left;margin-bottom:var(--sp4)}
.fbar:hover{border-color:var(--ink-3)}
.fbar-l{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);flex:0 0 auto}
.fbar-v{flex:1;font-size:13.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fbar-x{font-family:var(--mono);font-size:11px;color:var(--ink-3);transition:transform .18s ease}
.fbar[aria-expanded="true"]{margin-bottom:0;border-bottom-color:transparent}
.fbar[aria-expanded="true"] .fbar-x{transform:rotate(180deg)}
.filters{border:1px solid var(--rule);border-top:0;background:var(--sheet-2);padding:var(--sp3);margin-bottom:var(--sp4)}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.frow + .frow{margin-top:var(--sp3);padding-top:var(--sp3);border-top:1px solid var(--rule-2)}
.flabel{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);width:100%;margin-bottom:2px}
.chip{font-family:var(--sans);font-size:12.5px;font-weight:500;background:var(--sheet);border:1px solid var(--rule);color:var(--ink-2);padding:6px 10px;cursor:pointer;border-radius:2px;line-height:1.3}
.chip:hover{border-color:var(--ink-3)}
.chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--sheet)}
.chip em{font-style:normal;font-family:var(--mono);font-size:10px;opacity:.6;margin-left:5px}

/* ---------- Karte ---------- */
.card{background:var(--sheet);border:1px solid var(--rule);box-shadow:0 1px 0 rgba(14,26,36,.05)}
.card-top{display:flex;align-items:center;gap:10px;padding:8px var(--sp5);border-bottom:1px solid var(--rule-2);font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3)}
.card-top .kap{color:var(--red);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.card-top .sp{flex:1}
.card-top .pos{flex:0 0 auto;font-variant-numeric:tabular-nums}
.q{padding:var(--sp5) var(--sp5) 6px;font-family:var(--cond);font-size:25px;line-height:1.28;font-weight:600;letter-spacing:-.005em}
.q-hint{padding:6px var(--sp5) var(--sp5);font-size:13.5px;color:var(--ink-3)}
.tap-hint{padding:0 var(--sp5) 20px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.a{padding:2px var(--sp5) var(--sp5);border-top:1px solid var(--rule-2);margin-top:var(--sp2)}
.a-lab{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--red);padding:14px 0 8px}
.a h1,.a h2,.a h3,.a h4{font-family:var(--cond);font-size:15px;letter-spacing:.02em;text-transform:uppercase;margin:18px 0 5px;color:var(--ink);font-weight:700}
.a h1:first-child,.a h2:first-child,.a h3:first-child,.a h4:first-child{margin-top:2px}
.a ul,.a ol{margin:5px 0 10px;padding-left:19px}
.a li{margin:3px 0}
.a p{margin:6px 0 10px}
.a table{border-collapse:collapse;width:100%;margin:0;font-size:14px}
.a th,.a td{border:1px solid var(--rule-2);padding:6px 9px;text-align:left;vertical-align:top}
.a th{background:var(--sheet-2);font-family:var(--cond);font-size:13px;text-transform:uppercase;letter-spacing:.03em}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0 12px;border:1px solid var(--rule-2)}
.tablewrap table{min-width:420px;border:0}
.a code,.fx{font-family:var(--mono);font-size:13.5px;background:var(--sheet-2);padding:1px 5px;border-radius:2px;border:1px solid var(--rule-2)}
.a .note{font-size:13px;color:var(--ink-2);border-left:2px solid var(--red);padding:4px 0 4px 11px;margin:12px 0}
.fig{margin:14px 0 6px;background:#fff;border:1px solid var(--rule-2);padding:10px;cursor:zoom-in}
.fig svg,.fig img{display:block;width:100%;height:auto}
.fig figcaption{font-family:var(--mono);font-size:10px;color:#7c8b96;letter-spacing:.04em;margin-top:8px;padding-top:7px;border-top:1px solid #d7dee4}
.block{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--rule);background:var(--sheet-2);font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3)}
.block div{padding:7px 12px;border-right:1px solid var(--rule-2);min-width:0}
.block div:last-child{border-right:0}
.block b{display:block;color:var(--ink);font-size:11px;letter-spacing:.02em;text-transform:none;font-weight:600;margin-top:1px;overflow-wrap:anywhere}

/* ---------- Multiple Choice ---------- */
.mc-lead{padding:10px var(--sp5) 0;font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3)}
.mc-opts{padding:8px var(--sp5) var(--sp5);display:grid;gap:6px}
.mc-opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:var(--sheet);border:1px solid var(--rule);border-radius:2px;padding:10px 12px;cursor:pointer;font-size:14.5px;line-height:1.45}
.mc-opt:hover{border-color:var(--ink-3)}
.mc-opt .kbd{font-family:var(--mono);font-size:11px;font-weight:600;line-height:1.4;color:var(--ink-3);border:1px solid var(--rule);border-radius:2px;padding:0 6px;flex:0 0 auto;margin-top:1px}
.mc-opt .txt{flex:1;min-width:0}
.mc-opt .mk{flex:0 0 auto;font-family:var(--mono);font-size:14px;line-height:1.3;color:var(--ink-3)}
.mc-opt[aria-pressed="true"]{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
.mc-opt[aria-pressed="true"] .kbd{background:var(--ink);color:var(--sheet);border-color:var(--ink)}
.mc-opt[disabled]{cursor:default}
.mc-opt[disabled]:hover{border-color:var(--rule)}
.mc-opt.ist-ok{border-color:var(--ok);box-shadow:inset 0 0 0 1px var(--ok)}
.mc-opt.ist-ok .kbd{background:var(--ok);border-color:var(--ok);color:#fff}
.mc-opt.ist-ok .mk{color:var(--ok)}
.mc-opt.ist-no{border-color:var(--no);box-shadow:inset 0 0 0 1px var(--no)}
.mc-opt.ist-no .kbd{background:var(--no);border-color:var(--no);color:#fff}
.mc-opt.ist-no .mk{color:var(--no)}
.mc-opt.fehlt{border-color:var(--ok);border-style:dashed}
.mc-opt.fehlt .mk,.mc-opt.fehlt .kbd{color:var(--ok)}
.mc-why{font-size:13px;line-height:1.55;color:var(--ink-2);border-left:2px solid var(--rule-2);padding:3px 0 3px 11px;margin:-1px 0 4px 34px}
.mc-why.ok{border-left-color:var(--ok)}
.mc-why.no{border-left-color:var(--no)}
.mc-why p{margin:0 0 6px}
.mc-why p:last-child{margin-bottom:0}
.mc-why code,.mc-why .fx{font-family:var(--mono);font-size:12.5px;background:var(--sheet-2);padding:1px 5px;border-radius:2px;border:1px solid var(--rule-2)}
.mc-res{margin:0 var(--sp5);padding:9px 12px;border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
.mc-res.ok{border-color:var(--ok);color:var(--ok)}
.mc-res.no{border-color:var(--no);color:var(--no)}
.mc-res b{font-weight:600}
.li-mc{font-family:var(--mono);font-size:9px;letter-spacing:.06em;border:1px solid var(--rule);border-radius:2px;padding:0 4px;color:var(--ink-3);flex:0 0 auto}

/* ---------- Aktionen ---------- */
.actionbar{position:sticky;bottom:0;z-index:20;margin:var(--sp4) 0 0;padding:var(--sp3) 0 calc(var(--sp3) + var(--safe-b));background:var(--sheet-a);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--rule)}
.acts{display:flex;gap:var(--sp2)}
.big{flex:1;padding:15px 10px;border:1px solid var(--ink);background:var(--ink);color:var(--sheet);font-family:var(--cond);font-size:17px;letter-spacing:.03em;text-transform:uppercase;font-weight:700;cursor:pointer;border-radius:2px;min-height:52px}
.big:hover{opacity:.88}
.big.no{background:var(--no);border-color:var(--no);color:#fff}
.big.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.big small{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;opacity:.7;font-weight:400;margin-top:2px}
.big.matt{background:var(--sheet);border-color:var(--rule);color:var(--ink-3);cursor:default}
.big.matt:hover{opacity:1}
.big.vor{outline:2px solid var(--ink);outline-offset:2px}
.nudge{flex:0 0 46px;padding:0;background:var(--sheet);border:1px solid var(--rule);color:var(--ink-2);border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:15px;min-height:52px}
.nudge:hover{border-color:var(--ink-3);color:var(--ink)}
.nudge[disabled]{opacity:.4;cursor:default}

/* ---------- Übersicht ---------- */
.search{display:flex;align-items:center;gap:var(--sp2);border:1px solid var(--rule);background:var(--sheet);padding:0 12px;margin-bottom:var(--sp3)}
.search input{flex:1;border:0;background:none;padding:11px 0;font-family:var(--sans);font-size:14.5px;color:var(--ink);-webkit-appearance:none;appearance:none}
.search input:focus{outline:0}
.search svg{width:15px;height:15px;stroke:var(--ink-3);fill:none;stroke-width:1.6}
.list{border:1px solid var(--rule);background:var(--sheet)}
.li{display:flex;gap:11px;align-items:baseline;padding:11px 14px;border-bottom:1px solid var(--rule-2);cursor:pointer;width:100%;text-align:left;background:none;border-left:0;border-right:0;border-top:0}
.li:last-child{border-bottom:0}
.li:hover{background:var(--sheet-2)}
.li .dot{width:8px;height:8px;border-radius:50%;background:var(--rule);flex:0 0 auto;position:relative;top:-1px}
.li .dot.b1,.li .dot.b2{background:var(--no)}
.li .dot.b3{background:var(--amber)}
.li .dot.b4,.li .dot.b5{background:var(--ok)}
.li .n{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);flex:0 0 40px}
.li .t{flex:1;font-size:14.5px;line-height:1.4;min-width:0}
.li .k{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;flex:0 0 auto}
.empty{padding:36px 20px;text-align:center;color:var(--ink-3);font-size:14px}
.done{text-align:center;padding:52px 20px;border:1px solid var(--rule);background:var(--sheet)}
.done h2{font-family:var(--cond);font-size:27px;margin:0 0 8px;text-transform:uppercase;letter-spacing:.02em}
.done p{color:var(--ink-2);margin:0 0 20px;font-size:14.5px}
.done .big{max-width:280px;margin:0 auto;flex:none;width:100%}

/* ---------- Fächerauswahl ---------- */
.fachliste{display:grid;gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:var(--sp4)}
.fachitem{display:flex;align-items:center;gap:var(--sp3);background:var(--sheet);border:0;padding:16px 18px;cursor:pointer;text-align:left;width:100%}
.fachitem:hover{background:var(--sheet-2)}
.fachitem .k{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;background:var(--ink);color:var(--sheet);padding:6px 9px;border-radius:2px;flex:0 0 auto}
.fachitem .txt{flex:1;min-width:0}
.fachitem .nm{font-family:var(--cond);font-size:18px;font-weight:700;letter-spacing:.01em;line-height:1.2}
.fachitem .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.04em;margin-top:3px}
.fachitem .go{font-family:var(--mono);font-size:14px;color:var(--ink-3);flex:0 0 auto}
.fachitem .mini{width:44px;height:4px;background:var(--rule-2);display:flex;flex:0 0 auto;margin-top:5px}
.fachitem .mini i{display:block;height:100%}

.msg{border:1px solid var(--rule);background:var(--sheet);padding:20px var(--sp5);margin-bottom:var(--sp4)}
.msg h2{font-family:var(--cond);font-size:20px;text-transform:uppercase;letter-spacing:.02em;margin:0 0 8px}
.msg p{margin:0 0 10px;font-size:14px;color:var(--ink-2);line-height:1.6}
.msg code{font-family:var(--mono);font-size:12.5px;background:var(--sheet-2);border:1px solid var(--rule-2);padding:1px 5px;border-radius:2px}
.msg.err{border-left:3px solid var(--red)}
.lade{padding:48px 20px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3)}

footer{max-width:900px;margin:var(--sp6) auto 0;padding:var(--sp4) var(--sp4) calc(var(--sp5) + var(--safe-b));border-top:1px solid var(--rule);font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.03em;line-height:1.8}
kbd{font-family:var(--mono);font-size:10px;border:1px solid var(--rule);background:var(--sheet);padding:1px 5px;border-radius:2px;color:var(--ink-2)}

/* ---------- Menü, Toast, Lightbox ---------- */
.scrim{position:fixed;inset:0;z-index:80;overscroll-behavior:contain;background:var(--scrim);display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--sheet);border:1px solid var(--rule);width:100%;max-width:520px;padding:var(--sp4) var(--sp4) calc(var(--sp4) + var(--safe-b));max-height:88vh;overflow:auto}
.sheet h3{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:var(--sp5) 0 var(--sp2);font-weight:500}
.sheet h3:first-child{margin-top:0}
.sheet-head{display:flex;align-items:center;gap:var(--sp3);margin-bottom:var(--sp4)}
.sheet-head .ttl{font-family:var(--cond);font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.03em}
.mbtn{display:block;width:100%;text-align:left;background:var(--sheet-2);border:1px solid var(--rule);border-radius:2px;padding:12px 14px;margin-bottom:var(--sp2);cursor:pointer;font-size:14px}
.mbtn:hover{border-color:var(--ink-3)}
.mbtn.danger{color:var(--red)}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =======================================================================
   Qard — App-Logik
   Fächer liegen als HTML-Dateien in faecher/ und werden über
   faecher/index.json eingebunden. Lernstand wird je Fach getrennt geführt.
   ======================================================================= */

/* ======================= Theme ======================= */
const THEME_KEY = 'qard-theme';
const THEME_ALT = 'psi-theme';   // Einstellung aus der Zeit vor der Umbenennung
function themePref(){ try{ return localStorage.getItem(THEME_KEY) || localStorage.getItem(THEME_ALT) || 'auto'; }catch(e){ return 'auto'; } }
function prefersDark(){
  try{ return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches); }
  catch(e){ return false; }
}
function applyTheme(pref){
  const dark = pref === 'dark' || (pref === 'auto' && prefersDark());
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const m = document.getElementById('metaTheme');
  if (m) m.setAttribute('content', dark ? '#0f151a' : '#dde3e8');
}
function setTheme(pref){ try{ localStorage.setItem(THEME_KEY, pref); }catch(e){} applyTheme(pref); }
applyTheme(themePref());
try{
  const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)');
  if (mq && mq.addEventListener) mq.addEventListener('change', () => { if (themePref() === 'auto') applyTheme('auto'); });
}catch(e){}

/* ======================= Speicher ======================= */
const KEY        = 'lernstand-v2';       // { KUERZEL: { kartenId: {box,r,w} } }
const KEY_ALT    = 'psi-lernstand-v1';   // flache Ablage aus der Einzelfach-Fassung
const KEY_LETZT  = 'letztes-fach';
const KEY_TOTALS = 'fach-umfang';

const supabaseUrl = 'https://wcgywnxnjnwvalhavkxz.supabase.co';
const supabaseAnonKey = 'sb_publishable_tAEyDNOwwPzpe9hJkQlx0w_iaySou6P';

let supabaseClient = null;
try {
  if (window.supabase && window.supabase.createClient)
    supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
} catch (e) { console.warn('Supabase nicht verfügbar — App läuft lokal weiter.', e); }

let USER_ID = null, USER_MAIL = '', lastSync = null;

/* Erkennt den alten flachen Aufbau und hängt ihn unter PSI ein. */
function istKartenstand(v){ return v && typeof v === 'object' && typeof v.box === 'number'; }
function normalisiere(o){
  if (!o || typeof o !== 'object') return {};
  const werte = Object.values(o);
  if (werte.length && werte.some(istKartenstand)) return { PSI: o };
  return o;
}

function loadLocal(){
  try {
    const neu = localStorage.getItem(KEY);
    if (neu) return JSON.parse(neu) || {};
    const alt = localStorage.getItem(KEY_ALT);
    if (alt) return normalisiere(JSON.parse(alt));
  } catch(e){}
  return {};
}
function saveLocal(v){ try{ localStorage.setItem(KEY, JSON.stringify(v)); }catch(e){} }

function mergeFach(a, b){
  const out = {};
  new Set([...Object.keys(a || {}), ...Object.keys(b || {})]).forEach(id => {
    const x = (a || {})[id], y = (b || {})[id];
    if (!x) { out[id] = y; return; }
    if (!y) { out[id] = x; return; }
    const sx = (x.r|0) + (x.w|0), sy = (y.r|0) + (y.w|0);
    out[id] = sx === sy ? ((x.box|0) >= (y.box|0) ? x : y) : (sx > sy ? x : y);
  });
  return out;
}
function mergeAlle(a, b){
  const out = {};
  new Set([...Object.keys(a || {}), ...Object.keys(b || {})]).forEach(k => {
    out[k] = mergeFach((a || {})[k], (b || {})[k]);
  });
  return out;
}

const Cloud = {
  async load(){
    if (!supabaseClient || !USER_ID) return null;
    try {
      const { data, error } = await supabaseClient
        .from('lernstand').select('daten').eq('user_id', USER_ID).single();
      if (error && error.code !== 'PGRST116') { console.error('Laden fehlgeschlagen:', error); return null; }
      return data ? normalisiere(data.daten) : null;
    } catch(e){ console.warn('Laden nicht möglich:', e); return null; }
  },
  async save(v){
    if (!supabaseClient || !USER_ID) return false;
    try {
      const { error } = await supabaseClient.from('lernstand').upsert({ user_id: USER_ID, daten: v });
      if (error) { console.error('Speichern fehlgeschlagen:', error); return false; }
      lastSync = new Date(); return true;
    } catch(e){ console.warn('Speichern nicht möglich:', e); return false; }
  },
  async clear(){
    if (!supabaseClient || !USER_ID) return;
    try { await supabaseClient.from('lernstand').delete().eq('user_id', USER_ID); } catch(e){}
  }
};

/* ======================= Zustand ======================= */
let ALLE = loadLocal();   // Lernstand aller Fächer
/* Übernahme aus der alten flachen Ablage einmalig festschreiben */
try{ if (!localStorage.getItem(KEY) && Object.keys(ALLE).length) saveLocal(ALLE); }catch(e){}
let S = {};               // Verweis auf den Stand des aktiven Fachs
let FAECHER = [];         // Inhalt von faecher/index.json
let FACH = null;          // aktives Fach
let CARDS = [], CATS = [];
let TOTALS = {};
try { TOTALS = JSON.parse(localStorage.getItem(KEY_TOTALS) || '{}'); } catch(e){ TOTALS = {}; }

let mode = 'prio', cat = '*', search = '';
let queue = [], qi = 0, revealed = false;
let picked = new Set();   // gewählte Antworten der aktuellen Auswahlfrage
let checked = false;      // Auswahlfrage schon ausgewertet?
let mcOrder = null;       // Reihenfolge der Antworten auf dieser Karte
let view = 'fach', filtersOpen = false, saveTimer = null;

const MODES = [['prio','Priorität'],['all','Alle gemischt'],['new','Nur ungesehene'],['weak','Nur wackelige']];
const $ = id => document.getElementById(id);

function persist(){
  saveLocal(ALLE);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => Cloud.save(ALLE).then(ok => { if (ok) updateSyncDot(); }), 800);
}
function rec(id){ if (!S[id]) S[id] = { box:0, r:0, w:0 }; return S[id]; }

/* ======================= Fächer laden ======================= */
async function ladeRegister(){
  const res = await fetch('faecher/index.json', { cache:'no-cache' });
  if (!res.ok) throw new Error('faecher/index.json — HTTP ' + res.status);
  const j = await res.json();
  const arr = Array.isArray(j) ? j : (j.faecher || []);
  return arr.filter(f => f && f.datei);
}

/* ---------- Multiple Choice im Quelltext ----------
   Eine Karte wird zur Auswahlfrage, sobald sie eine Liste mit
   class="mc" (oder data-mc) enthält. Jedes <li> ist eine Option:
     data-richtig            markiert eine richtige Antwort
     class="begruendung"     Begründung als Element im <li>
     data-begruendung="…"    Begründung als Attribut
   An Liste oder <article>:
     data-mehrfach           erzwingt Mehrfachauswahl
     data-mischen            mischt die Antworten bei jedem Aufruf
   Alles, was neben der Liste im <article> steht, bleibt die
   allgemeine Begründung und erscheint nach dem Auswerten.       */
const MC_MAX = 8;
const MC_LABELS = ['A','B','C','D','E','F','G','H'];

function leseMC(el, datei, id){
  let liste = el.querySelector('ul.mc, ol.mc, ul[data-mc], ol[data-mc]');
  if (!liste && /^mc/i.test(el.getAttribute('data-typ') || '')) liste = el.querySelector('ul, ol');
  if (!liste) return null;

  const opts = [...liste.children].filter(n => n.tagName === 'LI').map(li => {
    const richtig = li.hasAttribute('data-richtig') || li.classList.contains('richtig');
    let why = (li.getAttribute('data-begruendung') || '').trim();
    const k = li.cloneNode(true);
    const b = k.querySelector('.begruendung');
    if (b){ why = b.innerHTML.trim(); b.remove(); }
    return { text: k.innerHTML.trim(), why, richtig };
  });

  const wo = datei + ' — Karte ' + id;
  if (opts.length < 2){ console.warn('Auswahlfrage mit weniger als zwei Antworten: ' + wo); return null; }
  if (opts.length > MC_MAX) console.warn('Mehr als ' + MC_MAX + ' Antworten (' + opts.length + '): ' + wo);
  if (!opts.some(o => o.richtig)) console.warn('Keine Antwort mit data-richtig markiert: ' + wo);

  const flag = n => liste.hasAttribute(n) || el.hasAttribute(n);
  const mc = {
    opts,
    mehrfach: flag('data-mehrfach') || opts.filter(o => o.richtig).length > 1,
    mischen : flag('data-mischen')
  };
  liste.remove();
  return mc;
}

/* Liest eine Fach-Datei: jedes <article> ist eine Karte,
   die erste Überschrift die Frage, alles danach die Antwort. */
function parseFach(html, eintrag){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const meta = n => {
    const m = doc.querySelector('meta[name="' + n + '"]');
    return m ? (m.getAttribute('content') || '').trim() : '';
  };
  /* index.json hat Vorrang: Was in der Auswahlliste steht, muss auch
     in der Kopfzeile stehen. Die Angaben in der Datei greifen, wenn
     im Register nichts eingetragen ist. */
  const name = (eintrag.name || '').trim() || meta('fach') || (doc.title || '').trim() || eintrag.datei;
  const kuerzel = ((eintrag.kuerzel || '').trim() || meta('kuerzel') || name.slice(0, 4)).trim().toUpperCase();

  const karten = [], gesehen = new Set();
  [...doc.querySelectorAll('article')].forEach((el, i) => {
    const h = el.querySelector('h1, h2, h3, [data-frage]');
    if (!h) return;
    const q = h.innerHTML.trim();
    h.remove();

    let hint = '';
    const hi = el.querySelector('.hinweis');
    if (hi){ hint = hi.innerHTML.trim(); hi.remove(); }

    let id = (el.getAttribute('data-id') || '').trim() || String(i + 1);
    if (gesehen.has(id)){
      console.warn('Doppelte data-id "' + id + '" in ' + eintrag.datei);
      id = id + '·' + (i + 1);
    }
    gesehen.add(id);

    const mc = leseMC(el, eintrag.datei, id);

    karten.push({
      id,
      cat: (el.getAttribute('data-kapitel') || '').trim() || 'Ohne Kapitel',
      src: (el.getAttribute('data-quelle') || '').trim(),
      ref: (el.getAttribute('data-ref') || '').trim(),
      q, hint, mc, a: el.innerHTML.trim()
    });
  });

  return { name, kuerzel, datei: eintrag.datei, karten };
}

async function oeffneFach(eintrag){
  view = 'fach';
  $('viewFach').classList.remove('hidden');
  $('fachOnly').classList.add('hidden');
  $('tabs').classList.add('hidden');
  $('fachHost').innerHTML = '<div class="lade">Lade ' + (eintrag.name || eintrag.datei) + ' …</div>';
  try {
    const res = await fetch('faecher/' + eintrag.datei, { cache:'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const fach = parseFach(await res.text(), eintrag);
    if (!fach.karten.length) throw new Error('keine <article>-Elemente mit Überschrift gefunden');
    setzeFach(fach);
  } catch(e){
    zeigeFehler('Fach „' + (eintrag.name || eintrag.datei) + '“ konnte nicht geladen werden',
      '<p><code>faecher/' + eintrag.datei + '</code> — ' + e.message + '</p>' +
      '<p>Liegt die Datei wirklich im Ordner <code>faecher/</code> und ist der Dateiname in ' +
      '<code>faecher/index.json</code> exakt so geschrieben? Groß- und Kleinschreibung zählt.</p>');
  }
}

function setzeFach(fach){
  FACH = fach;
  CARDS = fach.karten;
  CATS = [...new Set(CARDS.map(c => c.cat))];
  if (!ALLE[fach.kuerzel]) ALLE[fach.kuerzel] = {};
  S = ALLE[fach.kuerzel];

  TOTALS[fach.kuerzel] = CARDS.length;
  try {
    localStorage.setItem(KEY_TOTALS, JSON.stringify(TOTALS));
    localStorage.setItem(KEY_LETZT, fach.datei);
  } catch(e){}

  $('fachK').textContent = fach.kuerzel;
  $('fachN').textContent = fach.name;

  mode = 'prio'; cat = '*'; search = ''; filtersOpen = false;
  if ($('q')) $('q').value = '';
  build();
  view = 'learn';
  render();
}

function zeigeFehler(titel, htmlText){
  view = 'fach';
  $('viewFach').classList.remove('hidden');
  $('fachOnly').classList.add('hidden');
  $('tabs').classList.add('hidden');
  $('fachHost').innerHTML = '<div class="msg err"><h2>' + titel + '</h2>' + htmlText + '</div>' +
    (FAECHER.length ? '<div class="fachliste" id="fl"></div>' : '');
  if (FAECHER.length) fuelleFachliste($('fl'));
}

/* ======================= Warteschlange ======================= */
function pool(){
  let p = CARDS.filter(c => cat === '*' || c.cat === cat);
  if (mode === 'new')  p = p.filter(c => rec(c.id).box === 0);
  if (mode === 'weak') p = p.filter(c => { const b = rec(c.id).box; return b > 0 && b <= 2; });
  return p;
}
function shuffle(a){ for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function build(){
  let p = pool();
  if (mode === 'prio'){
    const g = {};
    p.forEach(c => { const b = rec(c.id).box; (g[b] = g[b] || []).push(c); });
    p = [];
    [1,2,0,3,4,5].forEach(b => { if (g[b]) p.push(...shuffle(g[b])); });
  } else p = shuffle(p.slice());
  queue = p; qi = 0; neueKarte();
}

/* Setzt alles zurück, was nur zur gerade gezeigten Karte gehört. */
function neueKarte(){
  revealed = false; checked = false; picked = new Set(); mcOrder = null;
}

/* Antworten in der Reihenfolge, in der sie gerade auf dem Schirm stehen.
   Die Reihenfolge steht fest, solange dieselbe Karte offen ist. */
function mcOpts(c){
  if (!c || !c.mc) return [];
  if (!mcOrder){
    mcOrder = c.mc.opts.map((_, i) => i);
    if (c.mc.mischen) shuffle(mcOrder);
  }
  return mcOrder.map(i => c.mc.opts[i]);
}
function mcTrefferzahl(c){ return mcOpts(c).filter(o => o.richtig).length; }
function mcIstRichtig(c){ return mcOpts(c).every((o, i) => o.richtig === picked.has(i)); }

function mcWaehle(i){
  const c = queue[qi];
  if (!c || !c.mc || checked) return;
  if (c.mc.mehrfach){
    picked.has(i) ? picked.delete(i) : picked.add(i);
    render();
  } else {
    picked = new Set([i]);
    mcPruefen();
  }
}
function mcPruefen(){
  const c = queue[qi];
  if (!c || !c.mc || checked || !picked.size) return;
  checked = true; revealed = true;
  render();
}

function grade(ok){
  const c = queue[qi]; if (!c) return;
  const r = rec(c.id);
  if (ok){ r.r++; r.box = Math.min(5, (r.box || 0) + 1); }
  else {
    r.w++; r.box = 1;
    if (qi + 3 < queue.length) queue.splice(qi + 3 + Math.floor(Math.random() * 3), 0, c);
    else queue.push(c);
  }
  persist(); next();
}
function next(){ qi++; neueKarte(); render(); }
function prev(){ if (qi > 0){ qi--; neueKarte(); render(); } }
function reveal(){
  const c = queue[qi];
  if (c && c.mc) return;               // Auswahlfragen werden geprüft, nicht aufgedeckt
  if (!revealed){ revealed = true; render(); }
}

/* ======================= Rendering ======================= */
function boxLabel(b){ return b === 0 ? 'ungesehen' : 'Box ' + b + '/5'; }

function render(){
  const aufAuswahl = view === 'fach';
  $('viewFach').classList.toggle('hidden', !aufAuswahl);
  $('fachOnly').classList.toggle('hidden', aufAuswahl);
  $('tabs').classList.toggle('hidden', aufAuswahl || !FACH);

  if (aufAuswahl){ renderFachAuswahl(); return; }

  renderStats(); renderFilters();
  $('viewLearn').classList.toggle('hidden', view !== 'learn');
  $('viewList').classList.toggle('hidden', view !== 'list');
  $('tabLearn').setAttribute('aria-selected', view === 'learn');
  $('tabList').setAttribute('aria-selected', view === 'list');

function fortschritt(kuerzel){
  const st = ALLE[kuerzel] || {};
  const total = TOTALS[kuerzel] || 0;
  let sit = 0, wack = 0;
  Object.values(st).forEach(r => { if (r.box >= 4) sit++; else if (r.box > 0) wack++; });
  return { total, sit, wack, neu: total ? Math.max(0, total - sit - wack) : 0 };
}

        '<i class="m-mid" style="width:' + (100*p.wack/p.total) + '%"></i></span>'

/* Antwortliste einer Auswahlfrage. Vor dem Prüfen sind die Antworten
   Schaltflächen, danach zeigen sie an, was richtig war, und geben die
   hinterlegten Begründungen aus. */
function mcMarkup(c){
  const opts = mcOpts(c);
  const treffer = mcTrefferzahl(c);
  const lead = checked
    ? 'Antworten'
    : (c.mc.mehrfach
        ? 'Mehrfachauswahl' + (treffer > 1 ? ' · ' + treffer + ' richtig' : '')
        : 'Eine Antwort wählen');

  const zeilen = opts.map((o, i) => {
    const gewaehlt = picked.has(i);
    let cls = '', mark = '';
    if (checked){
      if (o.richtig && gewaehlt){ cls = ' ist-ok'; mark = '✓'; }
      else if (o.richtig)       { cls = ' fehlt';  mark = '✓'; }
      else if (gewaehlt)        { cls = ' ist-no'; mark = '✗'; }
    } else if (gewaehlt) mark = '•';

    const btn =
      `<button class="mc-opt${cls}" data-opt="${i}" aria-pressed="${gewaehlt}" ${checked ? 'disabled' : ''}>
         <span class="kbd">${MC_LABELS[i] || (i + 1)}</span>
         <span class="txt">${o.text}</span>
         <span class="mk" aria-hidden="true">${mark}</span>
       </button>`;

    const why = checked && o.why
      ? `<div class="mc-why ${o.richtig ? 'ok' : 'no'}">${o.why}</div>`
      : '';
    return btn + why;
  }).join('');

  return `<div class="mc-lead">${lead}</div><div class="mc-opts">${zeilen}</div>`;
}

function renderList(){

    (c.mc && c.mc.opts.some(o => strip(o.text).toLowerCase().includes(term))));

  $('listHost').innerHTML = p.map(c => {
    const r = rec(c.id);
    return `<button class="li" data-jump="${c.id}">
      <span class="dot b${r.box}"></span>

      <span class="t">${c.q}</span>
      ${c.mc ? '<span class="li-mc">MC</span>' : ''}

    </button>`;

let tX = 0, tY = 0, tT = 0;
const host = $('cardHost');
host.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  tX = e.touches[0].clientX; tY = e.touches[0].clientY; tT = Date.now();
}, { passive:true });
host.addEventListener('touchend', e => {
  if (view !== 'learn' || !e.changedTouches.length) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - tX, dy = t.clientY - tY;
  if (Date.now() - tT > 700) return;
  if (Math.abs(dx) < 65 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
  const c = queue[qi];
  if (c && c.mc && !checked) return;    // erst antworten, dann bewerten
  if (!revealed){ reveal(); return; }
  grade(dx > 0);
}, { passive:true });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape'){
    document.querySelectorAll('.lb, .scrim').forEach(x => x.remove());
    document.documentElement.classList.remove('locked');
    return;
  }
  if (view !== 'learn') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.querySelector('.scrim, .lb')) return;

  const c = queue[qi];

  /* Auswahlfrage, noch nicht geprüft: Ziffern wählen, Enter prüft. */
  if (c && c.mc && !checked){
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= mcOpts(c).length){ e.preventDefault(); mcWaehle(n - 1); return; }
    if (e.code === 'Space' || e.key === 'Enter'){ e.preventDefault(); mcPruefen(); return; }
    if (e.key.toLowerCase() === 'n'){ e.preventDefault(); next(); }
    return;
  }

  if (e.code === 'Space' && !revealed){ e.preventDefault(); reveal(); return; }
  if (!revealed) return;
  /* Nach dem Prüfen übernimmt Enter die vorgeschlagene Bewertung. */
  if (c && c.mc && (e.code === 'Space' || e.key === 'Enter')){
    e.preventDefault(); grade(mcIstRichtig(c)); return;
  }
  if (e.key === '1' || e.key === 'ArrowLeft'){ e.preventDefault(); grade(false); }
  if (e.key === '2' || e.key === 'ArrowRight'){ e.preventDefault(); grade(true); }
  if (e.key.toLowerCase() === 'n'){ e.preventDefault(); next(); }
});

(async function start(){
  try {
    FAECHER = await ladeRegister();
  } catch(e){
    zeigeFehler('Keine Fächerliste gefunden',
      '<p>' + e.message + '</p>' +
      '<p>Es fehlt die Datei <code>faecher/index.json</code>. Sie listet auf, welche Fächer es gibt:</p>' +
      '<p><code>[ { "datei": "psi.html", "name": "Propulsion System Integration", "kuerzel": "PSI" } ]</code></p>' +
      '<p>Falls du die Seite gerade lokal per Doppelklick geöffnet hast: Über <code>file://</code> darf der Browser ' +
      'keine Dateien nachladen. Das funktioniert nur über GitHub Pages oder einen lokalen Server.</p>');
    return;
  }
  if (!FAECHER.length){
    zeigeFehler('Fächerliste ist leer', '<p>In <code>faecher/index.json</code> steht noch kein Fach.</p>');
    return;
  }

  let ziel = null;
  try {
    const p = (new URLSearchParams(location.search).get('fach') || '').toUpperCase();
    if (p) ziel = FAECHER.find(f => (f.kuerzel || '').toUpperCase() === p);
    if (!ziel){
      const letzt = localStorage.getItem(KEY_LETZT);
      if (letzt) ziel = FAECHER.find(f => f.datei === letzt);
    }
  } catch(e){}
  if (!ziel && FAECHER.length === 1) ziel = FAECHER[0];

  if (ziel) oeffneFach(ziel);
  else render();
})();

/* ======================= PWA ======================= */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });

if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing; if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller){
            toast('Neue Version verfügbar.', 'Neu laden', () => {
              nw.postMessage({ type:'SKIP_WAITING' });
              location.reload();
            });
          }
        });
      });
    }).catch(() => {});
  });
}
</script>
